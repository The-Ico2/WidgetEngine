<div class="widget-root timer-root">
    <div class="timer-display" id="timer-display">00:00</div>
    <div class="timer-controls">
        <input type="number" id="timer-minutes" class="timer-input" min="0" placeholder="Minutes" />
        <input type="number" id="timer-seconds" class="timer-input" min="0" max="59" placeholder="Seconds" />
        <button id="timer-start" class="timer-btn">Start</button>
        <button id="timer-pause" class="timer-btn">Pause</button>
        <button id="timer-reset" class="timer-btn">Reset</button>
    </div>
</div>
