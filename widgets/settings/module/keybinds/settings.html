<style>
    #keybind-settings {
        font-family: Arial, sans-serif;
        color: #eee;
        background-color: #1a1a1a;
        border-radius: 8px;
        width: inherit;
        height: 100%;
        /* padding: 1px; */
        overflow-y: auto;
        margin: 0 auto;
    }

    #top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }

    #top-bar p {
        font-size: 24px;
        font-weight: bold;
        margin: 0;
    }

    #settings-panel-content-close {
        cursor: pointer;
        font-weight: bold;
        padding: 0 8px;
        background-color: #ff4444;
        border-radius: 4px;
        user-select: none;
        transition: background 0.2s;
    }

    #settings-panel-content-close:hover {
        background-color: #ff0000;
    }

    hr {
        border-color: #444;
        margin: 10px 0;
    }

    .settings {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }

    .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px;
        border-radius: 4px;
        background-color: #222;
        transition: background 0.2s;
    }

    .setting-row:hover {
        background-color: #333;
    }

    .setting-row label {
        flex: 1;
        font-weight: bold;
    }

    .setting-row input {
        width: 180px;
        padding: 4px 6px;
        border-radius: 4px;
        border: none;
        background-color: #333;
        color: #fff;
        font-weight: bold;
        text-align: center;
        cursor: pointer;
        user-select: none;
    }

    .setting-row input:focus {
        outline: 2px solid #00aaff;
    }

</style>

<div id="keybind-settings">
    <div id="top-bar">
        <p>Keybinds</p>
        <div id="settings-panel-content-close">X</div>
    </div>
    <hr>
    <div class="settings">
        <div class="setting-row">
            <label>Open Settings Widget</label>
            <input type="text" data-action="settings" readonly value="CTRL + SHIFT + W">
        </div>
        <div class="setting-row">
            <label>Open Keybind Settings</label>
            <input type="text" data-action="settings.keybinds" readonly value="CTRL + SHIFT + /">
        </div>
    </div>
</div>

<script>
    const MODIFIERS = ["Control", "Shift", "Alt"];

    document.querySelectorAll('#keybind-settings input[data-action]').forEach(input => {
        input.addEventListener('keydown', e => {
            e.preventDefault();
            const keys = [];

            // Add modifiers first
            MODIFIERS.forEach(mod => {
                if (e.getModifierState(mod)) keys.push(mod.toUpperCase());
            });

            // Add main key (non-modifier)
            if (!MODIFIERS.includes(e.key)) keys.push(e.key.toUpperCase());

            // Limit to 3 keys
            const combo = keys.slice(0, 3).join(' + ');

            input.value = combo;

            const action = input.dataset.action;
            if (window.Update && typeof Update.keybind === "function") {
                Update.keybind(action, combo);
            }
        });
    });

    // Close button logic
    const closeBtn = document.getElementById("settings-panel-content-close");
    closeBtn.addEventListener("click", () => {
        document.getElementById("settings-panel-content").style.display = "none";
    });
</script>
