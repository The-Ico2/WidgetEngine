<div id="general-styling-settings">
    <h2>General Styling</h2>
    <div class="setting-row">
        <label>Background Color</label>
        <input type="color" id="bg-color" value="#000000">
    </div>
    <div class="setting-row">
        <label>Font Color</label>
        <input type="color" id="font-color" value="#ffffff">
    </div>
    <div class="setting-row">
        <label>Font Size</label>
        <input type="number" id="font-size" value="14">
    </div>
</div>

<script>
    document.getElementById('bg-color').addEventListener('change', e => {
        const val = e.target.value;
        Update.styling('backgroundColor', val); // assuming Update.styling exists
    });

    document.getElementById('font-color').addEventListener('change', e => {
        const val = e.target.value;
        Update.styling('fontColor', val);
    });

    document.getElementById('font-size').addEventListener('change', e => {
        const val = Number(e.target.value);
        Update.styling('fontSize', val);
    });
</script>
